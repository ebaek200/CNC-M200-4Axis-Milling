<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNC-M200 Parts Photo Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--card:#1c2128;--card-h:#242a33;--border:#30363d;
  --t1:#c9d1d9;--t2:#8b949e;--th:#e6edf3;
  --blue:#58a6ff;--green:#7ee787;--orange:#f0883e;--purple:#bc8cff;
  --yellow:#e3b341;--cyan:#79c0ff;--red:#f85149;
  --font:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);line-height:1.6;font-size:15px;min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:1200px;margin:0 auto;padding:40px 24px 60px}
h1{color:var(--th);font-size:1.8rem;text-align:center;margin-bottom:6px}
h1 span{color:var(--blue)}
.sub{text-align:center;color:var(--t2);font-size:0.9rem;margin-bottom:32px}
.cat{margin:32px 0 12px;padding:14px 20px;background:var(--card);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;gap:12px}
.cat-badge{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:800;flex-shrink:0}
.cat-name{font-size:1rem;font-weight:700;color:var(--th);flex:1}
.cat-cnt{font-size:0.8rem;color:var(--t2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:all 0.2s;text-decoration:none;color:inherit}
.card:hover{background:var(--card-h);border-color:#484f58;transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.3);text-decoration:none}
.card-num{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:800;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:0.9rem;font-weight:700;color:var(--th);line-height:1.4;margin-bottom:3px}
.card-spec{font-size:0.78rem;color:var(--t2);line-height:1.4;margin-bottom:4px}
.card-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-qty{font-size:0.72rem;font-weight:600;padding:2px 8px;border-radius:10px;background:rgba(126,231,135,0.1);color:var(--green);border:1px solid rgba(126,231,135,0.2)}
.card-search{font-size:0.7rem;color:var(--blue);opacity:0.6}
.card:hover .card-search{opacity:1}
.footer{text-align:center;color:var(--t2);font-size:0.8rem;margin-top:40px;padding-top:20px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="wrap">

<div id="app"></div>

<div class="footer">&copy; 2026 SY-BAEK Engineering &mdash; CNC-M200 4-Axis Milling Machine</div>
</div>

</body>
</html>
